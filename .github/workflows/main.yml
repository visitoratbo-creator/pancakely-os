name: Build Custom Linux Distro
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-efi-arm64-bin \
          dosfstools \
          mtools \
          qemu-user-static \
          binfmt-support \
          parted \
          kpartx \
          systemd-container \
          xorriso \
          isolinux \
          syslinux-common

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Execute build engine for ${{ matrix.arch }}
        run: sudo ./build.sh ${{ matrix.arch }}

      - name: Upload ${{ matrix.arch }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-linux-${{ matrix.arch }}
          path: |
            *.iso
            *.img
